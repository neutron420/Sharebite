services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - INTERNAL_WS_URL=http://ws:8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sharebite-network

  ws:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "run", "server/ws.ts"]
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sharebite-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: sharebite
      POSTGRES_PASSWORD: sharebite_password
      POSTGRES_DB: sharebite_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharebite -d sharebite_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sharebite-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - sharebite-network

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    environment:
      - GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL=${GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL}
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      web:
        condition: service_started
      ws:
        condition: service_started
    profiles:
      - monitoring
    networks:
      - sharebite-network

networks:
  sharebite-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

