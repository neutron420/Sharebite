apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sharebite-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/neutron420/Sharebite.git
    targetRevision: master
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: sharebite-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
