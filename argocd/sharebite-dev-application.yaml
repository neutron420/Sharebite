apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sharebite-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/neutron420/Sharebite.git
    targetRevision: master
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: sharebite-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
