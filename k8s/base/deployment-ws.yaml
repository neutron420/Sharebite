apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharebite-ws
  labels:
    app.kubernetes.io/name: sharebite-ws
    app.kubernetes.io/component: ws
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sharebite-ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sharebite-ws
        app.kubernetes.io/component: ws
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ws
          image: ghcr.io/neutron420/sharebite:latest
          imagePullPolicy: IfNotPresent
          command: ["bun", "run", "server/ws.ts"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sharebite-config
            - secretRef:
                name: sharebite-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
