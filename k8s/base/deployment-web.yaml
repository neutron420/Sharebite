apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharebite-web
  labels:
    app.kubernetes.io/name: sharebite-web
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sharebite-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sharebite-web
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: ghcr.io/neutron420/sharebite:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "server.js"]
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: sharebite-config
            - secretRef:
                name: sharebite-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
