apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sharebite-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "sharebite-ws"
spec:
  tls:
    - hosts:
        - app.example.com
      secretName: sharebite-app-tls
    - hosts:
        - ws.example.com
      secretName: sharebite-ws-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sharebite-web
                port:
                  number: 3000
    - host: ws.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sharebite-ws
                port:
                  number: 8080
